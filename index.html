<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Minesweeper Large</title>
    <style>
        :root {
            --light-green: #aad751;
            --dark-green: #a2d149;
            --dirt-light: #e5c29f;
            --dirt-dark: #d7b899;
            --bg-forest: #4a752c;
        }

        body {
            background-color: var(--bg-forest);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevent scrolling */
        }

        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90vmin; /* Scales with screen size */
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 2vh 0;
            font-size: 4vmin;
            font-weight: 600;
            color: white;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 80vmin;  /* Board takes up 80% of the smallest screen dimension */
            height: 80vmin;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 4vmin; /* Dynamic font size */
            font-weight: 900;
            user-select: none;
            transition: filter 0.1s;
        }

        .cell:hover {
            filter: brightness(1.1);
        }

        /* Grass Colors */
        .cell.light { background-color: var(--light-green); }
        .cell.dark { background-color: var(--dark-green); }

        /* Dirt Colors */
        .cell.revealed.light { background-color: var(--dirt-light); }
        .cell.revealed.dark { background-color: var(--dirt-dark); }

        /* Number Colors */
        .n1 { color: #1976d2; }
        .n2 { color: #388e3c; }
        .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; }

        .reset-btn {
            margin-top: 3vh;
            padding: 1.5vh 4vh;
            font-size: 2.5vmin;
            font-weight: bold;
            color: #4a752c;
            background-color: #aad751;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #3a5e23;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #3a5e23;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="game-header">
            <span>🚩 <span id="mine-count">10</span></span>
            <span>⏱️ <span id="timer">0</span></span>
        </div>

        <div id="grid"></div>

        <button class="reset-btn" onclick="initGame()">Play Again</button>
    </div>

    <script>
        const rows = 10, cols = 10, totalMines = 10;
        let board = [], gameOver = false, timer = 0, interval;

        function initGame() {
            gameOver = false; timer = 0; clearInterval(interval);
            document.getElementById('timer').innerText = '0';
            document.getElementById('mine-count').innerText = totalMines;
            board = [];
            const grid = document.getElementById('grid');
            grid.innerHTML = '';

            for(let r=0; r<rows; r++) {
                board[r] = [];
                for(let c=0; c<cols; c++) {
                    board[r][c] = { isMine: false, revealed: false, flagged: false, count: 0 };
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r+c)%2===0 ? 'light' : 'dark'}`;
                    cell.id = `cell-${r}-${c}`;
                    cell.onclick = () => handleMove(r, c);
                    cell.oncontextmenu = (e) => { e.preventDefault(); toggleFlag(r, c); };
                    grid.appendChild(cell);
                }
            }

            let placed = 0;
            while(placed < totalMines) {
                let r = Math.floor(Math.random()*rows), c = Math.floor(Math.random()*cols);
                if(!board[r][c].isMine) { board[r][c].isMine = true; placed++; }
            }

            for(let r=0; r<rows; r++) {
                for(let c=0; c<cols; c++) {
                    if(board[r][c].isMine) continue;
                    let count = 0;
                    for(let i=-1; i<=1; i++) 
                        for(let j=-1; j<=1; j++) 
                            if(board[r+i]?.[c+j]?.isMine) count++;
                    board[r][c].count = count;
                }
            }
        }

        function handleMove(r, c) {
            if(gameOver || board[r][c].flagged || board[r][c].revealed) return;
            if(timer === 0) interval = setInterval(() => { timer++; document.getElementById('timer').innerText = timer; }, 1000);

            const data = board[r][c];
            data.revealed = true;
            const el = document.getElementById(`cell-${r}-${c}`);
            el.classList.add('revealed');

            if(data.isMine) {
                gameOver = true; clearInterval(interval);
                el.innerText = '💣'; el.style.backgroundColor = '#f44336';
                revealAll();
            } else {
                if(data.count > 0) {
                    el.innerText = data.count;
                    el.classList.add('n' + data.count);
                } else {
                    for(let i=-1; i<=1; i++) 
                        for(let j=-1; j<=1; j++) 
                            if(board[r+i]?.[c+j]) handleMove(r+i, c+j);
                }
            }
            checkWin();
        }

        function toggleFlag(r, c) {
            if(gameOver || board[r][c].revealed) return;
            board[r][c].flagged = !board[r][c].flagged;
            document.getElementById(`cell-${r}-${c}`).innerText = board[r][c].flagged ? '🚩' : '';
            const flagsUsed = board.flat().filter(c => c.flagged).length;
            document.getElementById('mine-count').innerText = totalMines - flagsUsed;
        }

        function revealAll() {
            board.flat().forEach((c, i) => {
                if(c.isMine) document.getElementById('grid').children[i].innerText = '💣';
            });
        }

        function checkWin() {
            const safeCells = board.flat().filter(c => !c.isMine);
            if(safeCells.every(c => c.revealed)) {
                gameOver = true; clearInterval(interval);
                alert("You cleared the garden! 🌻");
            }
        }

        initGame();
    </script>
</body>
</html>
