<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Garden Minesweeper</title>
    <style>
        :root {
            --light-green: #aad751;
            --dark-green:  #a2d149;
            --dirt-light:  #e5c29f;
            --dirt-dark:   #d7b899;
            --bg-forest:   #4a752c;
            --text-white:  #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg-forest);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 90vmin;
        }
        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 2vh 0;
            font-size: 5vmin;
            font-weight: 600;
            color: var(--text-white);
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            width: 85vmin;
            height: 85vmin;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            background-color: var(--dark-green);
        }
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 5.5vmin;
            font-weight: 900;
            user-select: none;
            transition: background 0.1s ease;
        }
        .cell.light { background-color: var(--light-green); }
        .cell.dark  { background-color: var(--dark-green); }
        .cell.revealed.light { background-color: var(--dirt-light); }
        .cell.revealed.dark  { background-color: var(--dirt-dark); }
        .n1 { color: #1976d2; }
        .n2 { color: #388e3c; }
        .n3 { color: #d32f2f; }
        .n4 { color: #7b1fa2; }
        #overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .popup {
            background: white;
            padding: 4vh 6vh;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn {
            padding: 1.5vh 4vh;
            font-size: 3vmin;
            font-weight: bold;
            color: white;
            background-color: #6fb23d;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 #3a5e23;
        }
        .hint {
            color: rgba(255,255,255,0.65);
            font-size: 2.4vmin;
            margin-top: 1.5vh;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="game-header">
        <span>🚩 <span id="mine-count">10</span></span>
        <span>⏱️ <span id="timer">0</span></span>
    </div>
    <div id="grid"></div>
    <button class="btn" style="margin-top:3vh;" onclick="initGame()">Restart</button>
    <div class="hint">Desktop: left-click reveal · right-click flag<br>Mobile: tap reveal · long-press flag</div>
</div>

<div id="overlay">
    <div class="popup">
        <h2 id="pop-title">You Won!</h2>
        <p id="pop-desc">Time: 0 seconds</p>
        <button class="btn" onclick="initGame()">Play Again</button>
    </div>
</div>

<script>

/* ═══════════════════════════════════════════════════════════════
   AUDIO ENGINE - UPDATED
   - Flag: Soft wooden "clack"
   - Button: Muted mechanical click
═══════════════════════════════════════════════════════════════ */
let AC = null;

function getAC() {
    if (!AC) {
        AC = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (AC.state === 'suspended') {
        AC.resume();
    }
    return AC;
}

document.addEventListener('touchstart', () => getAC(), { passive: true });
document.addEventListener('mousedown',  () => getAC(), { passive: true });

let _comp = null;
function master() {
    if (_comp) return _comp;
    const ac = getAC();
    _comp = ac.createDynamicsCompressor();
    _comp.threshold.value = -10;
    _comp.connect(ac.destination);
    return _comp;
}

function makeNoiseBuf(dur) {
    const ac = getAC();
    const len = Math.ceil(ac.sampleRate * dur);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
}

/* ──────────────────────────────────────────────────────────────
   sfxBtn — Muted mechanical click for UI buttons
────────────────────────────────────────────────────────────── */
function sfxBtn() {
    const ac = getAC();
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const g = ac.createGain();
    
    osc.type = 'square'; // Sharper start
    osc.frequency.setValueAtTime(150, now);
    osc.frequency.exponentialRampToValueAtTime(40, now + 0.05);
    
    g.gain.setValueAtTime(0.05, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
    
    osc.connect(g);
    g.connect(master());
    osc.start(now);
    osc.stop(now + 0.06);
}

/* ──────────────────────────────────────────────────────────────
   sfxFlag — Soft wooden "clack" (ear-friendly)
────────────────────────────────────────────────────────────── */
function sfxFlag() {
    const ac = getAC();
    const now = ac.currentTime;

    // Layer 1: The "click" of wood hitting wood
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(400, now);
    osc.frequency.exponentialRampToValueAtTime(100, now + 0.04);
    g.gain.setValueAtTime(0.1, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.04);
    osc.connect(g); g.connect(master());
    osc.start(now); osc.stop(now + 0.05);

    // Layer 2: Low-mid body resonance
    const noise = ac.createBufferSource();
    noise.buffer = makeNoiseBuf(0.05);
    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 800;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.08, now);
    ng.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
    noise.connect(lp); lp.connect(ng); ng.connect(master());
    noise.start(now); noise.stop(now + 0.06);
}

// Keep sfxReveal, sfxBoom, sfxWin as they were...
function sfxReveal() {
    const ac = getAC();
    const now = ac.currentTime;
    const osc = ac.createOscillator();
    const og = ac.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520, now);
    osc.frequency.exponentialRampToValueAtTime(180, now + 0.07);
    og.gain.setValueAtTime(0, now);
    og.gain.linearRampToValueAtTime(0.20, now + 0.004);
    og.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
    osc.connect(og); og.connect(master());
    osc.start(now); osc.stop(now + 0.16);
}

function sfxBoom() {
    const ac = getAC();
    const now = ac.currentTime;
    const sub = ac.createOscillator();
    const subg = ac.createGain();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(90, now);
    sub.frequency.exponentialRampToValueAtTime(22, now + 0.65);
    subg.gain.setValueAtTime(0.55, now);
    subg.gain.exponentialRampToValueAtTime(0.0001, now + 0.75);
    sub.connect(subg); subg.connect(master());
    sub.start(now); sub.stop(now + 0.8);
}

function sfxWin() {
    const ac = getAC();
    const now = ac.currentTime;
    const notes = [523.25, 659.25, 783.99, 1046.50];
    notes.forEach((freq, i) => {
        const t = now + i * 0.1;
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.type = 'sine';
        o.frequency.value = freq;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.1, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
        o.connect(g); g.connect(master());
        o.start(t); o.stop(t + 0.6);
    });
}

/* ──────────────────────────────────────────────────────────────
   Modified Logic to include Button Sounds
────────────────────────────────────────────────────────────── */
function initGame() {
    sfxBtn(); // Play sound when restarting
    gameOver = false; timer = 0; firstClick = true;
    clearInterval(timerInterval);
    document.getElementById('timer').innerText = '0';
    document.getElementById('mine-count').innerText = TOTAL_MINES;
    document.getElementById('overlay').style.display = 'none';
    if (_comp) { try { _comp.disconnect(); } catch(e){} _comp = null; }
    board = [];
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
            board[r][c] = { isMine: false, revealed: false, flagged: false, count: 0 };
            const cell = document.createElement('div');
            cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
            cell.dataset.r = r; cell.dataset.c = c;
            cell.addEventListener('click', onCellClick);
            cell.addEventListener('contextmenu', onCellRightClick);
            cell.addEventListener('touchstart', onTouchStart, { passive: false });
            cell.addEventListener('touchend', onTouchEnd, { passive: false });
            grid.appendChild(cell);
        }
    }
}

// ... rest of game logic handles sfxFlag() inside toggleFlag()

/* ═══════════════════════════════════════════════════════════════
   GAME LOGIC
═══════════════════════════════════════════════════════════════ */
const ROWS = 10, COLS = 10, TOTAL_MINES = 10;
let board, gameOver, timer, timerInterval, firstClick;
let longPressTimeout = null;

function initGame() {
    gameOver   = false;
    timer      = 0;
    firstClick = true;
    clearInterval(timerInterval);
    document.getElementById('timer').innerText      = '0';
    document.getElementById('mine-count').innerText = TOTAL_MINES;
    document.getElementById('overlay').style.display = 'none';

    // Reset compressor so it's fresh
    if (_comp) { try { _comp.disconnect(); } catch(e){} _comp = null; }

    board = [];
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
            board[r][c] = { isMine: false, revealed: false, flagged: false, count: 0 };
            const cell = document.createElement('div');
            cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
            cell.dataset.r = r;
            cell.dataset.c = c;
            cell.addEventListener('click',       onCellClick);
            cell.addEventListener('contextmenu', onCellRightClick);
            cell.addEventListener('touchstart',  onTouchStart,  { passive: false });
            cell.addEventListener('touchend',    onTouchEnd,    { passive: false });
            cell.addEventListener('touchmove',   onTouchMove,   { passive: false });
            cell.addEventListener('touchcancel', onTouchCancel, { passive: false });
            grid.appendChild(cell);
        }
    }
}

function onCellClick(e) {
    getAC();
    handleReveal(+e.currentTarget.dataset.r, +e.currentTarget.dataset.c);
}
function onCellRightClick(e) {
    e.preventDefault(); getAC();
    toggleFlag(+e.currentTarget.dataset.r, +e.currentTarget.dataset.c);
}
function onTouchStart(e) {
    e.preventDefault(); getAC();
    const r = +e.currentTarget.dataset.r, c = +e.currentTarget.dataset.c;
    longPressTimeout = setTimeout(() => { longPressTimeout = null; toggleFlag(r, c); }, 500);
}
function onTouchEnd(e) {
    e.preventDefault();
    if (longPressTimeout !== null) {
        clearTimeout(longPressTimeout); longPressTimeout = null;
        handleReveal(+e.currentTarget.dataset.r, +e.currentTarget.dataset.c);
    }
}
function onTouchMove(e)   { e.preventDefault(); if (longPressTimeout) { clearTimeout(longPressTimeout); longPressTimeout = null; } }
function onTouchCancel(e) { if (longPressTimeout) { clearTimeout(longPressTimeout); longPressTimeout = null; } }

function plantMines(safeR, safeC) {
    let placed = 0;
    while (placed < TOTAL_MINES) {
        const r = Math.floor(Math.random() * ROWS);
        const c = Math.floor(Math.random() * COLS);
        if (!board[r][c].isMine && !(Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1)) {
            board[r][c].isMine = true; placed++;
        }
    }
    for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++) {
            if (board[r][c].isMine) continue;
            let count = 0;
            for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++)
                    if (board[r+dr]?.[c+dc]?.isMine) count++;
            board[r][c].count = count;
        }
}

function handleReveal(r, c) {
    if (gameOver || board[r][c].flagged || board[r][c].revealed) return;
    if (firstClick) {
        plantMines(r, c); firstClick = false;
        timerInterval = setInterval(() => {
            timer++;
            document.getElementById('timer').innerText = timer;
        }, 1000);
    }
    board[r][c].revealed = true;
    const el = document.getElementById('grid').children[r * COLS + c];
    el.classList.add('revealed');
    if (board[r][c].isMine) {
        el.innerText = '💣';
        sfxBoom();
        endGame(false);
        return;
    }
    sfxReveal();
    if (board[r][c].count > 0) {
        el.innerText = board[r][c].count;
        el.classList.add('n' + board[r][c].count);
    } else {
        for (let dr = -1; dr <= 1; dr++)
            for (let dc = -1; dc <= 1; dc++)
                if (board[r+dr]?.[c+dc]) handleReveal(r+dr, c+dc);
    }
    checkWin();
}

function toggleFlag(r, c) {
    if (gameOver || board[r][c].revealed) return;
    board[r][c].flagged = !board[r][c].flagged;
    document.getElementById('grid').children[r * COLS + c].innerText = board[r][c].flagged ? '🚩' : '';
    sfxFlag();
    const flagsUsed = board.flat().filter(cell => cell.flagged).length;
    document.getElementById('mine-count').innerText = TOTAL_MINES - flagsUsed;
}

function checkWin() {
    if (board.flat().filter(cell => !cell.isMine).every(cell => cell.revealed)) endGame(true);
}

function endGame(win) {
    gameOver = true;
    clearInterval(timerInterval);
    if (win) {
        sfxWin();
    } else {
        board.flat().forEach((cell, i) => {
            if (cell.isMine) document.getElementById('grid').children[i].innerText = '💣';
        });
    }
    document.getElementById('pop-title').innerText = win ? "Cleared! 🌻" : "Boom! 💥";
    document.getElementById('pop-desc').innerText  = win ? `Time: ${timer}s` : "You hit a mine.";
    document.getElementById('overlay').style.display = 'flex';
}

initGame();
</script>
</body>
</html>
